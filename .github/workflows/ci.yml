name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy src
      - name: Pytest
        run: pytest -q
      - name: TypeScript SDK install
        working-directory: packages/notary-sdk-ts
        run: npm install --ignore-scripts
      - name: TypeScript SDK build
        working-directory: packages/notary-sdk-ts
        run: npm run build
      - name: TypeScript SDK tests
        working-directory: packages/notary-sdk-ts
        run: npm test -- --coverage=false
